<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Interactive Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0C040;
    --dark: #0a0f1a;
    --dark2: #111827;
    --dark3: #1a2235;
    --card: #1e2d45;
    --card2: #162033;
    --border: rgba(201,168,76,0.25);
    --border2: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #7a8aaa;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue: #3498db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0f1a 0%, #162033 50%, #0a0f1a 100%);
    border-bottom: 2px solid var(--gold);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 4px; color: var(--gold-light); }
  .header-sub { font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .header-flags { display: flex; gap: 8px; align-items: center; font-size: 28px; }
  .nav { display: flex; gap: 4px; }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
    font-weight: 600;
  }

  /* PAGES */
  .page { display: none; padding: 32px 40px 60px; }
  .page.active { display: block; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--gold-light);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* GROUPS GRID */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    background: linear-gradient(90deg, var(--gold) 0%, #a07820 100%);
    padding: 8px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: #000;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .group-header span { font-size: 11px; font-family: 'Inter', sans-serif; letter-spacing: 1px; opacity: 0.7; }
  .group-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .group-table thead tr { background: var(--card2); }
  .group-table th { padding: 5px 6px; color: var(--muted); font-weight: 500; text-align: center; font-size: 10px; letter-spacing: 0.5px; }
  .group-table th:first-child { text-align: left; padding-left: 10px; }
  .group-table td { padding: 7px 6px; border-bottom: 1px solid var(--border2); text-align: center; }
  .group-table td:first-child { text-align: left; padding-left: 10px; font-weight: 500; }
  .group-table tr:last-child td { border-bottom: none; }
  .group-table tr:hover td { background: rgba(201,168,76,0.06); }
  .score-input {
    width: 32px;
    background: var(--dark3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--gold-light);
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    padding: 2px;
    font-family: 'Inter', sans-serif;
  }
  .score-input:focus { outline: none; border-color: var(--gold); }
  .pts-badge {
    display: inline-block;
    background: var(--dark3);
    border-radius: 4px;
    padding: 2px 6px;
    font-weight: 600;
    font-size: 11px;
    color: var(--gold-light);
    min-width: 20px;
    text-align: center;
  }
  .qualified { background: rgba(46,204,113,0.12) !important; }
  .qualified td:first-child { border-left: 3px solid var(--green); padding-left: 7px; }
  .playoff-spot { background: rgba(52,152,219,0.08) !important; }
  .playoff-spot td:first-child { border-left: 3px solid var(--blue); padding-left: 7px; }

  /* MATCHES IN GROUP */
  .group-matches {
    border-top: 1px solid var(--border2);
    padding: 8px;
  }
  .match-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 4px;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .match-row:last-child { border-bottom: none; }
  .match-teams { flex: 1; display: flex; align-items: center; gap: 4px; }
  .match-team { flex: 1; }
  .match-team.home { text-align: right; font-weight: 500; }
  .match-team.away { text-align: left; }
  .match-vs { color: var(--muted); font-size: 10px; padding: 0 4px; }
  .match-score { display: flex; align-items: center; gap: 4px; margin: 0 8px; }
  .match-date { color: var(--muted); font-size: 9px; white-space: nowrap; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; margin-bottom: 20px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* BRACKET */
  .bracket-container { overflow-x: auto; }
  .bracket-scroll { min-width: 1200px; padding-bottom: 20px; }
  .bracket-rounds { display: flex; gap: 0; align-items: stretch; }
  .bracket-round { flex: 1; display: flex; flex-direction: column; }
  .round-label {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 13px;
    color: var(--gold);
    padding: 8px 4px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .round-matches { display: flex; flex-direction: column; justify-content: space-around; flex: 1; gap: 8px; padding: 0 4px; }
  .bracket-match {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .bracket-match:hover { border-color: var(--gold); }
  .bracket-team {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 500;
    gap: 4px;
  }
  .bracket-team:first-child { border-bottom: 1px solid var(--border2); }
  .bracket-team-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bracket-score {
    width: 22px;
    text-align: center;
    background: var(--dark3);
    border-radius: 3px;
    padding: 1px 3px;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold-light);
    border: none;
    color-scheme: dark;
    font-family: 'Inter', sans-serif;
  }
  .bracket-score:focus { outline: 1px solid var(--gold); }
  .bracket-match-info {
    background: var(--card2);
    padding: 2px 8px;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
  }
  .bracket-winner .bracket-team:first-child { background: rgba(201,168,76,0.12); }
  .tbd { color: var(--muted); font-style: italic; }

  /* FINAL */
  .final-match {
    background: linear-gradient(135deg, #1a2a40 0%, #1e2d45 100%);
    border: 2px solid var(--gold);
    border-radius: 10px;
    overflow: hidden;
    max-width: 280px;
    margin: 0 auto;
  }
  .final-label {
    background: var(--gold);
    color: #000;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    font-size: 16px;
    padding: 6px;
  }
  .champion-box {
    background: linear-gradient(135deg, #1e2d45 0%, #0f1d30 100%);
    border: 2px solid var(--gold);
    border-radius: 10px;
    text-align: center;
    padding: 20px;
    max-width: 200px;
    margin: 0 auto;
  }
  .champion-box .trophy { font-size: 36px; display: block; margin-bottom: 8px; }
  .champion-box .label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--gold); }
  .champion-box .team { font-size: 16px; font-weight: 700; color: var(--gold-light); margin-top: 4px; }

  /* SCHEDULE */
  .schedule-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .schedule-filter {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .schedule-filter:hover, .schedule-filter.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
  .search-box {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    min-width: 180px;
  }
  .search-box:focus { outline: none; border-color: var(--gold); }
  .search-box::placeholder { color: var(--muted); }

  .schedule-day {
    margin-bottom: 24px;
  }
  .day-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--gold);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .schedule-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .schedule-table th { text-align: left; padding: 6px 10px; color: var(--muted); font-weight: 500; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border2); }
  .schedule-table td { padding: 8px 10px; border-bottom: 1px solid var(--border2); vertical-align: middle; }
  .schedule-table tr:hover td { background: rgba(201,168,76,0.04); }
  .schedule-table tr.hidden { display: none; }
  .match-number { color: var(--muted); font-size: 10px; }
  .group-badge {
    display: inline-block;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .time-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--gold-light);
  }
  .venue-cell { color: var(--muted); font-size: 11px; }
  .vs-text { color: var(--muted); }
  .team-strong { font-weight: 600; }

  @media (max-width: 900px) {
    .groups-grid { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 16px 20px; }
    .page { padding: 20px 16px 60px; }
    .header-title { font-size: 24px; }
  }
  @media (max-width: 600px) {
    .groups-grid { grid-template-columns: 1fr; }
    .nav-btn { padding: 6px 10px; font-size: 10px; }
  }

  /* PRINT STYLES */
  @media print {
    .header { position: static; }
    .nav { display: none; }
    .page { display: block !important; page-break-before: always; }
    body { background: white; color: black; }
  }
</style>
</head>

    <button class="schedule-filter" onclick="filterPhase('r16',this)">Round of 16</button>
    <button class="schedule-filter" onclick="filterPhase('qf',this)">Quarter-Finals</button>
    <button class="schedule-filter" onclick="filterPhase('sf',this)">Semi-Finals</button>
    <button class="schedule-filter" onclick="filterPhase('final',this)">Final</button>
  </div>
  <div id="schedule-container"></div>
</div>

// ── GROUP STANDINGS CALC ───────────────────────────────────────────────────────

function calcStandings(grpLetter) {
  const teams = GROUPS[grpLetter].teams;
  const matches = GROUP_MATCHES[grpLetter];
  const stats = {};
  teams.forEach(t => stats[t] = {p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});

  matches.forEach((m, i) => {
    const key = grpLetter + i;
    const hs = matchScores[key + 'h'];
    const as = matchScores[key + 'a'];
    if (hs !== undefined && as !== undefined && hs !== '' && as !== '') {
      const h = parseInt(hs), a = parseInt(as);
      if (isNaN(h) || isNaN(a)) return;
      stats[m.home].p++; stats[m.away].p++;
      stats[m.home].gf += h; stats[m.home].ga += a;
      stats[m.away].gf += a; stats[m.away].ga += h;
      if (h > a) { stats[m.home].w++; stats[m.home].pts += 3; stats[m.away].l++; }
      else if (h < a) { stats[m.away].w++; stats[m.away].pts += 3; stats[m.home].l++; }
      else { stats[m.home].d++; stats[m.away].d++; stats[m.home].pts++; stats[m.away].pts++; }
    }
  });

  return teams.slice().sort((a,b) => {
    const da = stats[a], db = stats[b];
    if (db.pts !== da.pts) return db.pts - da.pts;
    const gdA = da.gf - da.ga, gdB = db.gf - db.ga;
    if (gdB !== gdA) return gdB - gdA;
    return db.gf - da.gf;
  }).map(t => ({name:t, ...stats[t]}));
}

    standings.forEach((team, idx) => {

      html += `<tr class="${rowClass}">

    html += `</tbody></table>

    matches.forEach((m, i) => {
      const kh = grpLetter + i + 'h', ka = grpLetter + i + 'a';
      const vh = matchScores[kh] !== undefined ? matchScores[kh] : '';
      const va = matchScores[ka] !== undefined ? matchScores[ka] : '';

    html += `</div></div>`;

}

// ── RENDER SCHEDULE ───────────────────────────────────────────────────────────

let currentPhaseFilter = 'all';

function renderSchedule() {
  const container = document.getElementById('schedule-container');
  const searchVal = (document.getElementById('schedule-search').value || '').toLowerCase();

  // Group by date
  const byDate = {};
  SCHEDULE.forEach((m, i) => {
    if (currentPhaseFilter !== 'all' && m.phase !== currentPhaseFilter) return;
    if (searchVal) {
      const searchable = (m.home + m.away + m.venue + m.grp).toLowerCase();
      if (!searchable.includes(searchVal)) return;
    }
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push({...m, idx: i});
  });

  let html = '';
  Object.keys(byDate).forEach(date => {
    html += `<div class="schedule-day">
      <div class="day-label">${date}</div>
      <table class="schedule-table">
        <thead><tr>
          <th style="width:70px">CET</th>
          <th>Match</th>
          <th style="width:40px">Grp</th>
          <th>Venue</th>
        </tr></thead>
        <tbody>`;

    byDate[date].forEach(m => {
      const grpColor = GROUPS[m.grp] ? GROUPS[m.grp].color : '#888';
      const isKnockout = ['r32','r16','qf','sf','final'].includes(m.phase);
      html += `<tr>
        <td><span class="time-badge">${m.time}</span></td>
        <td>
          <span class="team-strong">${flag(m.home)}</span>
          <span class="vs-text" style="margin:0 8px">vs</span>
          <span class="team-strong">${flag(m.away)}</span>
        </td>
        <td>
          <span class="group-badge" style="color:${grpColor};border-color:${grpColor}55">${m.grp}</span>
        </td>
        <td class="venue-cell">${m.venue}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  if (!html) {
    html = `<div style="text-align:center;color:var(--muted);padding:40px;font-size:14px">No matches found for your filter.</div>`;
  }

  container.innerHTML = html;
}

function filterPhase(phase, btn) {
  currentPhaseFilter = phase;
  document.querySelectorAll('.schedule-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchedule();
}

function filterSchedule() { renderSchedule(); }

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'schedule') renderSchedule();
}
